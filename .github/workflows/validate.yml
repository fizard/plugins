name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.204

      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .claude-plugin/marketplace.json

      - name: Validate Codex manifest, skills, assets, and catalogs
        run: python3 scripts/validate_repo.py

      - name: Codex manifest version matches CHANGELOG head
        run: |
          manifest_version=$(jq -r .version plugins/qonto-matchmaker/.codex-plugin/plugin.json)
          changelog_version=$(grep -m1 '^## ' CHANGELOG.md | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "manifest: $manifest_version — changelog head: $changelog_version"
          test "$manifest_version" = "$changelog_version"
